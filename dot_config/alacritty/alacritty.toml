[general]
import = ["themes/theme.toml"]

[font]
normal = { family = "CaskaydiaCove Nerd Font", style = "Regular" }
size = 14.0

[window]
dimensions = { columns = 120, lines = 30 }
padding = { x = 0, y = 0 }
dynamic_padding = true
decorations = "Full"
startup_mode = "Windowed"

[cursor]
style = { shape = "Underline", blinking = "On" }

[env]
TERM = "xterm-256color"
